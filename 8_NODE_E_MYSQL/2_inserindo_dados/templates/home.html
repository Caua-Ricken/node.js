<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/home.css">
    <title>Home</title>
</head>
<body>
    <h1>Cadastre o seu livro</h1>

    <form action="/books/insert" method="POST" class="form">
        <div class="form-control">
            <label for="title">Título:</label>
            <input type="text" name="title" placeholder="digite o titulo" id="title">
        </div>

         <div class="form-control">
            <label for="pages">Numero de paginas:</label>
            <input type="number" name="pages" placeholder="digite o numero de paginas" id="pages">
        </div>
        <input type="submit" value="Enviar">
    </form>


</body>
</html>
