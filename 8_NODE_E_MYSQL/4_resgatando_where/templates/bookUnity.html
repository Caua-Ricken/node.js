<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros</title>
</head>
<body>
    <h1>Detalhes do Livro</h1>

    <div id="book"></div>

    
    <a href="/view" class="btn">Voltar</a>

     <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id')

        const books = async () => {
            const res = await fetch(`/book/${id}`)
            const data = await res.json()

            const div = document.getElementById('book');

            div.innerHTML = `
             <h2>${data.title}</h2>
             <p>${data.pageqtd} páginas</p>
            `;
        }
        books()
     </script>
</body>
</html>
